{% extends "base.html" %}
{% block content %}

<div class="container-fluid">

  <!-- HEADER -->
  <div class="text-center mb-4">
    <h3 class="fw-bold mb-1">📦 Products</h3>
    <p class="text-muted mb-3">Manage your product inventory</p>

    <button class="btn btn-success px-4"
            data-bs-toggle="modal"
            data-bs-target="#stockModal">
      ➕ Add Stock
    </button>
  </div>

  <!-- TABLE -->
  <div class="card p-3">
    <div class="table-responsive">
      <table class="table align-middle mb-0" id="productTable">

        <thead class="text-center text-muted">
          <tr>
            <th class="text-start">Product</th>
            <th>Price</th>
            <th>Stock</th>
          </tr>
        </thead>

        <tbody>
          {% for p in products %}
          <tr>
            <td class="fw-semibold">{{ p[1] }}</td>
            <td class="text-center">₹ {{ p[2] }}</td>

            <td class="text-center">
              {% if p[3] < 10 %}
                <span class="badge bg-danger">{{ p[3] }}</span>
              {% elif p[3] < 20 %}
                <span class="badge bg-warning text-dark">{{ p[3] }}</span>
              {% else %}
                <span class="badge bg-success">{{ p[3] }}</span>
              {% endif %}
            </td>
          </tr>
          {% endfor %}
        </tbody>

      </table>
    </div>
  </div>

</div>

<!-- ================= MODAL ================= -->

<div class="modal fade" id="stockModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content p-3">

      <form method="POST" action="/add-stock">

        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold">➕ Add Stock</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <!-- PRODUCT SELECT (ENHANCED SEARCH INSIDE SAME SELECT) -->
          <div class="mb-3">
            <label class="form-label">Product</label>
            <select id="productDropdown" class="form-select">
              <option value="">-- Select Product --</option>

              {% for p in products %}
              <option value="{{p[0]}}"
                      data-price="{{p[2]}}"
                      data-stock="{{p[3]}}">
                {{p[1]}}
              </option>
              {% endfor %}

              <option value="NEW">➕ Add New Product</option>
            </select>
          </div>

          <input type="hidden" name="product_id" id="productId">

          <div id="newProductDiv" class="mb-3 d-none">
            <input type="text" name="new_product_name"
                   class="form-control"
                   placeholder="Enter new product name">
          </div>

          <div class="mb-3">
            <label class="form-label">Price</label>
            <input type="number" step="0.01"
                   name="price"
                   id="priceInput"
                   class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" name="quantity" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" name="received_date" class="form-control" required>
          </div>

        </div>

        <div class="modal-footer border-0">
          <button class="btn btn-success w-100">Save Stock</button>
        </div>

      </form>

    </div>
  </div>
</div>

<!-- ================= STYLES ================= -->
<style>
option:disabled {
  color: #999;
  background: #f3f3f3;
}
</style>

<!-- ================= JS ================= -->
<script>

const dropdown = document.getElementById("productDropdown");
const priceInput = document.getElementById("priceInput");
const productIdInput = document.getElementById("productId");
const newDiv = document.getElementById("newProductDiv");

// ================= PRODUCT SELECT LOGIC =================
dropdown.addEventListener("change", function () {

  const selected = this.options[this.selectedIndex];

  if (this.value === "NEW") {
    newDiv.classList.remove("d-none");
    productIdInput.value = "";
    priceInput.value = "";
  } else {
    newDiv.classList.add("d-none");

    productIdInput.value = this.value;

    if (selected.dataset.price) {
      priceInput.value = parseFloat(selected.dataset.price).toFixed(2);
    }
  }
});


// ================= INLINE SEARCH INSIDE SELECT =================
// Type-to-filter WITHOUT extra input box

let allOptions = Array.from(dropdown.options);

dropdown.addEventListener("keydown", function (e) {

  let key = e.key.toLowerCase();

  // ignore control keys
  if (key.length > 1 && key !== "backspace") return;

  setTimeout(() => {

    let search = dropdown.dataset.search || "";

    if (key === "backspace") {
      search = search.slice(0, -1);
    } else {
      search += key;
    }

    dropdown.dataset.search = search;

    let filtered = allOptions.filter(opt => {
      if (!opt.value || opt.value === "NEW") return true;

      return opt.text.toLowerCase().includes(search);
    });

    // sort A-Z always
    filtered.sort((a, b) => a.text.localeCompare(b.text));

    dropdown.innerHTML = "";

    filtered.forEach(opt => {
      dropdown.appendChild(opt);
    });

  }, 0);
});

</script>

{% endblock %}
