{% extends "base.html" %}
{% block content %}

<div class="container-fluid">

  <!-- ===== HEADER ===== -->
  <div class="text-center mb-4">
    <h3 class="fw-bold mb-1">💰 Add Payment</h3>
    <p class="text-muted mb-3">Manage customer payments efficiently</p>
  </div>

  <form method="POST" action="/add-payment">

    <!-- ================= CUSTOMER CARD ================= -->
    <div class="card p-3 mb-3">

      <h5 class="fw-bold mb-3">Customer Details</h5>

      <div class="row g-3">

        <div class="col-md-4 col-12">
          <label class="form-label">Customer</label>
          <select name="customer_id" id="customerSelect" class="form-select" required>
            <option value="">-- Select Customer --</option>
            {% for c in customers %}
              <option value="{{ c[0] }}">{{ c[1] }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-4 col-6">
          <label class="form-label">Current Balance</label>
          <input type="text" id="currentBalance" class="form-control text-end bg-light fw-bold" readonly>
        </div>

        <div class="col-md-4 col-6">
          <label class="form-label">Balance After Payment</label>
          <input type="text" id="finalBalance" class="form-control text-end fw-bold bg-light" readonly>
        </div>

      </div>

    </div>

    <!-- ================= PAYMENT ================= -->
    <div class="card p-3 mb-3">

      <div class="row g-3 align-items-end">

        <div class="col-md-4 col-6">
          <label class="form-label">Payment Amount</label>
          <input type="number"
                 step="0.01"
                 min="0"
                 name="amount"
                 id="paymentAmount"
                 class="form-control text-end"
                 required>
        </div>

        <div class="col-md-4 col-6">
          <label class="form-label">Payment Mode</label>
          <select name="payment_mode" id="paymentMode" class="form-select" required>
            <option value="">-- Select Mode --</option>
            <option value="Cash">Cash</option>
            <option value="UPI">UPI</option>
            <option value="Cheque">Cheque</option>
          </select>
        </div>

        <div class="col-md-4 col-12">
          <label class="form-label">Reference No</label>
          <input type="text"
                 name="reference_no"
                 id="referenceNo"
                 class="form-control"
                 placeholder="Optional">
        </div>

      </div>

      <!-- Remaining Balance -->
      <div class="mt-3">
        <small id="remainingBalanceText" class="fw-bold"></small>
      </div>

    </div>

    <!-- ================= REMARK ================= -->
    <div class="card p-3">

      <div class="mb-2">
        <label class="form-label">Remarks</label>
        <input type="text"
               name="remarks"
               class="form-control"
               placeholder="Optional note">
      </div>

      <button class="btn btn-success w-100 mt-3 py-2">
        Save Payment
      </button>

    </div>

  </form>

</div>

<!-- ================= SCRIPT ================= -->
<script>

document.addEventListener("DOMContentLoaded", function () {

function calculateBalance() {

    let current = parseFloat(document.getElementById("currentBalance").value) || 0;
    let amount = parseFloat(document.getElementById("paymentAmount").value) || 0;

    let final = current - amount;

    let finalField = document.getElementById("finalBalance");
    finalField.value = final.toFixed(2);

    let text = document.getElementById("remainingBalanceText");
    text.innerText = "Remaining Balance: ₹ " + final.toFixed(2);

    if (final < 0) {
        finalField.classList.add("text-danger");
        text.classList.add("text-danger");
        text.classList.remove("text-success");
    } else {
        finalField.classList.remove("text-danger");
        text.classList.add("text-success");
        text.classList.remove("text-danger");
    }
}

// Fetch balance
document.getElementById("customerSelect").addEventListener("change", function () {

    let customerId = this.value;
    if (!customerId) return;

    fetch(`/get-customer-balance/${customerId}`)
        .then(res => res.json())
        .then(data => {

            let balance = parseFloat(data.balance) || 0;

            document.getElementById("currentBalance").value = balance.toFixed(2);

            document.getElementById("paymentAmount").value = "";
            document.getElementById("finalBalance").value = "";
            document.getElementById("remainingBalanceText").innerText = "";

        });

});

// Live calculation
document.getElementById("paymentAmount").addEventListener("input", calculateBalance);

});
</script>

{% endblock %}
